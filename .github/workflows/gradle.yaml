name: Java CI

on:
  merge_group:
    branches:
      - main
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5

      - run: ./gradlew build
      - run: ./gradlew spotlessCheck
      - run: ./gradlew javadoc

      - uses: actions/upload-artifact@v7
        if: github.actor != 'nektos/act'
        with:
          name: switcheroo
          path: build/libs
          compression-level: 9
          if-no-files-found: error
